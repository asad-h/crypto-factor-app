name: Daily data refresh

on:
  schedule:
    - cron: "15 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BLOCKWORKS_API_KEY: ${{ secrets.BLOCKWORKS_API_KEY }}
      BLOCKWORKS_BASE_URL: ${{ secrets.BLOCKWORKS_BASE_URL || 'https://api.blockworks.com' }}
      COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'CryptoFactorModel/1.0 github-actions@users.noreply.github.com' }}
      SCREENER_FORCE_RAW_SOURCE_REFRESH: "true"

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$BLOCKWORKS_API_KEY" ]; then
            echo "::error::Missing required repo secret: BLOCKWORKS_API_KEY"
            exit 1
          fi
          if [ -z "$COINGECKO_API_KEY" ]; then
            echo "::warning::COINGECKO_API_KEY is not set. Refresh will use CoinGecko public endpoints and may hit rate limits."
          fi

      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh screener cache
        run: python scripts/refresh_screener_cache.py

      - name: Refresh market update snapshot
        run: python scripts/refresh_market_update_cache.py

      - name: Commit refreshed cache files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/screener/*.parquet cache/market_update/latest.pkl
          if git diff --cached --quiet; then
            echo "No cache changes to commit."
          else
            git commit -m "Refresh dashboard data"
            git push
          fi
